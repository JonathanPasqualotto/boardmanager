<style>
* { touch-action: manipulation; }

html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
}

body {
    display: flex;
    flex-direction: column;
    background: #f8f9fa;
}

/* Painel superior */
#topPanel {
    padding: 10px;
    background: #ffffff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    z-index: 10;
}

/* Área do jogo */
#board {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* Lados */
.side {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    user-select: none;
}

.side.active {
    background-color: #e9ecef;
}

.clock-display {
    font-size: 4.5rem;
}

.player-label {
    font-size: 1.2rem;
    margin-top: 10px;
}

/* Placar */
#score {
    font-size: 2rem;
    font-weight: bold;
}

#score2 {
    font-size: 2rem;
    font-weight: bold;
}

.btn-circle {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.btn-circle i {
    font-size: 1.8rem;
    line-height: 1;
}

/* Bloco central */
.center-side {
    height: 80px;
    margin: 6px 0;
    border: 2px solid #000;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.2rem;
    font-weight: bold;
    background: #fff;
}

#leftSide {
    background: #33ca05;
    transform: rotate(180deg);

    /* Garante que a div se comporte bem no layout */
    display: flex;
    flex-direction: column; /* Organiza os itens em coluna */
    align-items: center;    /* Centraliza os botões e o relógio */
    justify-content: center;
    gap: 15px;     
}

.button-group {
    display: flex;
    flex-direction: row; /* Coloca lado a lado */
    justify-content: center; /* Centraliza horizontalmente */
    gap: 30px; /* Espaço razoável entre os botões */
    margin-bottom: 10px; /* Afasta um pouco do relógio total */
}

.side {
    height: 100%; /* Garante que a div ocupe o espaço necessário */
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: background-color 0.3s ease;
}

.timeout {
    background-color: #dc3545 !important; /* Vermelho do Bootstrap */
}

#rightSide {
    background: #cabd05;
}

#totalClock {
    font-size: 35px;
}

#totalClock2 {
    font-size: 35px;
}

.btn-circle:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

</style>
</head>

<body>

<!-- Tabuleiro -->
<div id="board">

    <div id="leftSide" class="side">
        <div class="button-group">
            <button id="leftGoalBtn" class="btn btn-circle">
                <i class="fa-solid fa-futbol"></i>
            </button>
            <button id="leftFlag" class="btn btn-circle">
                <i class="fa-solid fa-flag-checkered"></i>
            </button>
        </div>      
        <span id="totalClock">05:00</span>
        <div class="clock-display" id="leftClock">00:00</div>        
    </div>

    <!-- BLOCO CENTRAL -->
    <div id="topPanel" class="text-center">
        <div id="score" style="transform: rotate(180deg);">0 : 0</div>
        <div class="row g-2 mb-2 align-items-center">
            <div class="col-3">
                <select id="tapeSelect" class="form-select">
                    <option value="30" selected>30s</option>
                    <option value="60">1min</option>
                    <option value="90">1min30s</option>
                </select>
            </div>
            <div class="col-3">
                <select id="totalSelect" class="form-select">
                    <option value="300" selected>5min</option>
                    <option value="600">10min</option>
                    <option value="1200">20min</option>
                </select>
            </div>
            <div class="col-3">
                <button id="startBtn" class="btn btn-primary w-100">
                    <i class="bi bi-play-fill"></i>
                </button>
            </div>
            <div class="col-3">
                <button id="resetBtn" class="btn btn-outline-secondary w-100">
                    <i class="bi bi-arrow-counterclockwise"></i>
                </button>
            </div>
        </div>
        <div id="score2">0 : 0</div>
    </div>
    

    <div id="rightSide" class="side">
        <div class="button-group">
            <button id="rightGoalBtn" class="btn btn-circle">
                <i class="fa-solid fa-futbol"></i>
            </button>
            <button id="rightFlag" class="btn btn-circle">
                <i class="fa-solid fa-flag-checkered"></i>
            </button>
        </div>      
        <span id="totalClock2">05:00</span>
        <div class="clock-display" id="rightClock">00:00</div>        
    </div>


</div>


<script>
const leftSide = document.getElementById("leftSide");
const rightSide = document.getElementById("rightSide");
const leftClockEl = document.getElementById("leftClock");
const rightClockEl = document.getElementById("rightClock");
const totalClockEl = document.getElementById("totalClock");
const totalClockEl2 = document.getElementById("totalClock2");
const scoreEl = document.getElementById("score");
const scoreEl2 = document.getElementById("score2");
const startBtn = document.getElementById("startBtn");
const resetBtn = document.getElementById("resetBtn");
const tapeSelect = document.getElementById("tapeSelect");
const totalSelect = document.getElementById("totalSelect");

let timer = null;
let leftTime = 0;
let rightTime = 0;
let totalTime = 0;
let tapeSeconds = 60;
let active = null;
let leftScore = 0;
let leftScore2 = 0;
let rightScore = 0;
let rightScore2 = 0;
let gameOver = false;
let isPaused = false; // Controle de pausa
let goalScorer = null; // Nova variável para saber quem marcou o golo

function formatTime(sec) {
    const m = String(Math.floor(sec / 60)).padStart(2, "0");
    const s = String(sec % 60).padStart(2, "0");
    return `${m}:${s}`;
}

function updateDisplays() {
    leftClockEl.textContent = formatTime(leftTime);
    rightClockEl.textContent = formatTime(rightTime);
    if (totalTime >= 0) {
        totalClockEl.textContent = formatTime(totalTime);
        totalClockEl2.textContent = formatTime(totalTime);
    }
    scoreEl.textContent = `${leftScore} : ${rightScore}`;
    scoreEl2.textContent = `${leftScore2} : ${rightScore2}`;
}

// Função para mudar o ícone do botão principal
function updateStartBtnIcon() {
    const icon = startBtn.querySelector('i');
    if (timer && !isPaused) {
        icon.className = 'bi bi-pause-fill';
        startBtn.classList.replace('btn-primary', 'btn-warning');
    } else {
        icon.className = 'bi bi-play-fill';
        startBtn.classList.replace('btn-warning', 'btn-primary');
    }
}

function tick() {
    if (gameOver || isPaused || !active) return;

    if (active === "left") {
        if (leftTime > 0) {
            leftTime--;
        } else {
            // O tempo do jogador da esquerda acabou!
            leftSide.classList.add("timeout"); // Fica vermelho
            isPaused = true; // Pausa o jogo (congelando o relógio total)
            updateStartBtnIcon();
            return;
        }
    } else if (active === "right") {
        if (rightTime > 0) {
            rightTime--;
        } else {
            // O tempo do jogador da direita acabou!
            rightSide.classList.add("timeout"); // Fica vermelho
            isPaused = true; // Pausa o jogo
            updateStartBtnIcon();
            return;
        }
    }

    if (totalTime > 0) totalTime--;
    // ... resto da lógica de Fim de Jogo ...
    updateDisplays();
}

function startTurn(side) {
    tapeSeconds = parseInt(tapeSelect.value);
    if (side === "left") {
        leftTime = tapeSeconds;
        active = "left";
    } else {
        rightTime = tapeSeconds;
        active = "right";
    }
    updateDisplays();
}

// Lógica do Botão Play/Pause
startBtn.onclick = () => {
    if (gameOver) return;

    if (timer === null) {
        // Início do Jogo pela primeira vez
        enterFullscreen();
        totalTime = parseInt(totalSelect.value);
        tapeSeconds = parseInt(tapeSelect.value);
        leftTime = tapeSeconds;
        rightTime = tapeSeconds;
        active = "left";
        isPaused = false;
        timer = setInterval(tick, 1000);
    } else {
        // Alterna entre Pausa e Play
        isPaused = !isPaused;
    }

    updateStartBtnIcon();
    updateDisplays();
};

resetBtn.onclick = () => {
    // Chama a função de reset que já tinhas
    resetGame();
    
    // Volta a tela ao normal
    exitFullscreen();
};

function resetGame() {
    clearInterval(timer);
    timer = null;
    isPaused = false;
    leftTime = 0;
    rightTime = 0;
    totalTime = 0;
    leftScore = 0;
    leftScore2 = 0;
    rightScore = 0;
    rightScore2 = 0;
    active = null;
    gameOver = false;
    totalClockEl.textContent = formatTime(parseInt(totalSelect.value));
    totalClockEl2.textContent = formatTime(parseInt(totalSelect.value));
    updateStartBtnIcon();
    updateDisplays();
    leftSide.classList.remove("timeout");
    rightSide.classList.remove("timeout");
    setGoalButtonsState(false);
}

// Interação de clique nas áreas dos jogadores
leftSide.onclick = () => {
    if (gameOver) return;

    // Se houve golo e quem marcou foi a esquerda, ela não pode reiniciar
    if (isPaused && goalScorer === "left") return; 

    if (isPaused) {
        // Se a direita marcou ou foi timeout, a esquerda pode retomar
        leftSide.classList.remove("timeout");
        rightSide.classList.remove("timeout");
        isPaused = false;
        goalScorer = null; // Reseta o marcador
        leftTime = parseInt(tapeSelect.value); // Reset do tempo do adversário
        rightTime = parseInt(tapeSelect.value);
        active = "left";
        setGoalButtonsState(false);
    } else if (active === "left") {
        leftTime = parseInt(tapeSelect.value); // Reset do tempo do adversário
        rightTime = parseInt(tapeSelect.value);
        active = "right";
    }

    updateStartBtnIcon();
    updateDisplays();
};


rightSide.onclick = () => {
    if (gameOver) return;

    // Se houve golo e quem marcou foi a direita, ela não pode reiniciar
    if (isPaused && goalScorer === "right") return;

    if (isPaused) {
        // Se a esquerda marcou ou foi timeout, a direita pode retomar
        leftSide.classList.remove("timeout");
        rightSide.classList.remove("timeout");
        isPaused = false;
        goalScorer = null; // Reseta o marcador
        leftTime = parseInt(tapeSelect.value); // Reset do tempo do adversário
        rightTime = parseInt(tapeSelect.value);
        active = "right";
        setGoalButtonsState(false);
    } else if (active === "right") {
        leftTime = parseInt(tapeSelect.value); // Reset do tempo do adversário
        rightTime = parseInt(tapeSelect.value);
        active = "left";
    }

    updateStartBtnIcon();
    updateDisplays();
};

// Função auxiliar para controlar os botões de golo
function setGoalButtonsState(disabled) {
    document.getElementById("leftGoalBtn").disabled = disabled;
    document.getElementById("rightGoalBtn").disabled = disabled;
}

// Botão de Golo Esquerda
document.getElementById("leftGoalBtn").onclick = e => {
    e.stopPropagation();
    if (gameOver || isPaused) return;

    leftScore++;
    leftScore2++;
    isPaused = true;
    goalScorer = "left"; // Registra que a esquerda marcou
    setGoalButtonsState(true);
    
    leftTime = parseInt(tapeSelect.value);
    rightTime = parseInt(tapeSelect.value);

    updateStartBtnIcon();
    updateDisplays();
};

// Botão de Golo Direita
document.getElementById("rightGoalBtn").onclick = e => {
    e.stopPropagation();
    if (gameOver || isPaused) return;

    rightScore++;
    rightScore2++;
    isPaused = true;
    goalScorer = "right"; // Registra que a direita marcou
    setGoalButtonsState(true);
    
    leftTime = parseInt(tapeSelect.value);
    rightTime = parseInt(tapeSelect.value);

    updateStartBtnIcon();
    updateDisplays();
};

// Botões de Flag
function handleFlagAction() {
    if (gameOver) return;
    isPaused = true;
    leftTime = parseInt(tapeSelect.value);
    rightTime = parseInt(tapeSelect.value);
    updateStartBtnIcon();
    updateDisplays();
}

document.getElementById("leftFlag").onclick = e => {
    e.stopPropagation();
    handleFlagAction();
};

document.getElementById("rightFlag").onclick = e => {
    e.stopPropagation();
    handleFlagAction();
};

// Função para entrar em Ecrã Inteiro (Full Compatibility)
function enterFullscreen() {
    const elem = document.documentElement;

    try {
        if (elem.requestFullscreen) {
            elem.requestFullscreen();
        } else if (elem.mozRequestFullScreen) { // Firefox (S maiúsculo)
            elem.mozRequestFullScreen();
        } else if (elem.webkitRequestFullscreen) { // Chrome, Safari, Opera
            elem.webkitRequestFullscreen();
        } else if (elem.webkitEnterFullscreen) { // Versões específicas do Safari iOS
            elem.webkitEnterFullscreen();
        } else if (elem.msRequestFullscreen) { // IE/Edge antigo
            elem.msRequestFullscreen();
        }
    } catch (err) {
        // ignora
    }
}

function exitFullscreen() {
    try {
        if (document.exitFullscreen) {
            document.exitFullscreen();
        } else if (document.mozCancelFullScreen) { // Firefox
            document.mozCancelFullScreen();
        } else if (document.webkitExitFullscreen) { // Safari/Chrome
            document.webkitExitFullscreen();
        } else if (document.msExitFullscreen) {
            document.msExitFullscreen();
        }
    } catch (err) {
        // Apenas ignora se já tiver saído
    }
}

</script>



</body>
</html>
