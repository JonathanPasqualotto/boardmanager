<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Cronômetro Board Manager™</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui">


<style>
* { touch-action: manipulation; }

html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
}

body {
    display: flex;
    flex-direction: column;
    background: #f8f9fa;
}

/* Painel superior */
#topPanel {
    padding: 10px;
    background: #ffffff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    z-index: 10;
}

/* Área do jogo */
#board {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* Lados */
.side {
    height: 100%;
    padding: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background-color 0.3s ease;
}

.side.active {
    background-color: #e9ecef;
}

.clock-display {
    font-size: 2.8rem; 
    line-height: 1;
}

.player-label {
    font-size: 1.2rem;
    margin-top: 10px;
}

/* Placar */
#score {
    font-size: 1.5rem;
    font-weight: bold;
    margin: 0 15px;
    transform: rotate(180deg);
}

/* Container circular para as logos */
.logo-wrapper {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border: 1px solid;
}

.logo-wrapper img {
    width: 100%;
    height: 100%;
}

.border-yellow { border-color: #cabd05; }
.border-green { border-color: #33ca05; }

#score2 {
    font-size: 1.5rem;
    font-weight: bold;
    margin: 0 15px;
}

.btn-circle {
    width: 48px;
    height: 48px;
    border-radius: 50%;
}

.btn-circle i {
    font-size: 1.5rem;
}

#leftSide {
    background: #33ca05;
    transform: rotate(180deg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 15px;
}

#leftSide .button-group { order: 1; }
#leftSide #totalClock  { order: 2; }
#leftSide #leftClock   { order: 3; }

#rightSide {
    background: #cabd05;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 15px;
}

#rightSide .button-group { order: 1; }
#rightSide #totalClock2 { order: 2; }
#rightSide #rightClock  { order: 3; }

.button-group {
    display: flex;
    flex-direction: row;
    justify-content: center;
    gap: 20px;
    margin-bottom: 2px;
}

.timeout {
    background-color: #dc3545 !important;
}

#totalClock, #totalClock2 {
    font-size: 28px;
}

.btn-circle:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

#startBtn:disabled {
    opacity: 0.5;
    filter: grayscale(1);
}

.move-counter {
    font-size: 1.2rem;
    background: rgba(255, 255, 255, 0.2);
    padding: 2px 10px;
    border-radius: 10px;
    margin-bottom: 5px;
}

#leftSide .move-counter { order: 0; }
#rightSide .move-counter { order: 0; }

.draw-highlight {
    filter: brightness(1.8);
    transition: filter 0.1s ease-in-out, filter 0.5s ease-out;
}

.limit-active {
    color: #dc3545;
    text-decoration: underline;
}

select:disabled, button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

@media (max-height: 600px) {
    .clock-display { font-size: 2.2rem; }
    #totalClock, #totalClock2 { font-size: 22px; }
    .side { gap: 5px; }
}

</style>
</head>

<body>

<div id="board">

    <div id="leftSide" class="side">
        <div id="leftMoveDisplay" class="move-counter">Jogadas: 0</div>
        <div class="button-group">
            <button id="leftGoalBtn" class="btn btn-circle">
                <i class="fa-solid fa-futbol"></i>
            </button>
            <button id="leftFlag" class="btn btn-circle">
                <i class="fa-solid fa-flag-checkered"></i>
            </button>
        </div>      
        <span id="totalClock">00:00</span>
        <div class="clock-display" id="leftClock">00:00</div>        
    </div>

    <div id="topPanel" class="text-center">
        
        <div class="row d-flex align-items-center justify-content-center g-3">
            <div class="col-auto">
                <div class="logo-wrapper border-yellow" style="background-color: #cabd05;">
                    <img src="logo.png" alt="logo" >
                </div>
            </div>
            <div class="col-auto">
                <div id="score">0 : 0</div>
            </div>
            <div class="col-auto">
                <div class="logo-wrapper border-green" style="background-color: #33ca05;">
                    <img src="logo.png" alt="logo" >
                </div>
            </div>
        </div>        
        
        <div class="row g-2 mb-2 align-items-center justify-content-center">
            <div class="col-4">
                <select id="tapeSelect" class="form-select">
                    <option value="30" selected>30s</option>
                    <option value="60">1min</option>
                    <option value="90">1min30s</option>
                </select>
            </div>
            <div class="col-4">
                <select id="totalSelect" class="form-select">
                    <option value="10">temp</option>
                    <option value="300" selected>5min</option>
                    <option value="600">10min</option>
                    <option value="1200">20min</option>
                </select>
            </div>
            <div class="col-4">
                <button id="startBtn" class="btn btn-primary w-100">
                    <i class="bi bi-play-fill"></i>
                </button>
            </div>
            <div class="col-4">
                <button id="flagBtn" class="btn w-100 bg-dark text-white ">
                    <strong>JOGADAS</strong>
                </button>
            </div>
            <div class="col-4">
                <button id="resetBtn" class="btn btn-outline-secondary w-100">
                    <i class="bi bi-arrow-counterclockwise"></i>
                </button>
            </div>
        </div>

        <div class="row d-flex align-items-center justify-content-center g-3">
            <div class="col-auto">
                <div class="logo-wrapper border-yellow" style="background-color: #cabd05;">
                    <img src="logo.png" alt="logo" >
                </div>
            </div>
            <div class="col-auto">
                <div id="score2">0 : 0</div>
            </div>
            <div class="col-auto">
                <div class="logo-wrapper border-green" style="background-color: #33ca05;">
                    <img src="logo.png" alt="logo" >
                </div>
            </div>
        </div>
    </div>
    
    <div id="rightSide" class="side">
        <div id="rightMoveDisplay" class="move-counter">Jogadas: 0</div>
        <div class="button-group">
            <button id="rightGoalBtn" class="btn btn-circle">
                <i class="fa-solid fa-futbol"></i>
            </button>
            <button id="rightFlag" class="btn btn-circle">
                <i class="fa-solid fa-flag-checkered"></i>
            </button>
        </div>      
        <span id="totalClock2">00:00</span>
        <div class="clock-display" id="rightClock">00:00</div>        
    </div>

</div>

<script>
const leftSide = document.getElementById("leftSide");
const rightSide = document.getElementById("rightSide");
const leftClockEl = document.getElementById("leftClock");
const rightClockEl = document.getElementById("rightClock");
const totalClockEl = document.getElementById("totalClock");
const totalClockEl2 = document.getElementById("totalClock2");
const scoreEl = document.getElementById("score");
const scoreEl2 = document.getElementById("score2");
const startBtn = document.getElementById("startBtn");
const resetBtn = document.getElementById("resetBtn");
const tapeSelect = document.getElementById("tapeSelect");
const totalSelect = document.getElementById("totalSelect");
const leftMoveEl = document.getElementById("leftMoveDisplay");
const rightMoveEl = document.getElementById("rightMoveDisplay");

let timer = null;
let leftTime = 0;
let rightTime = 0;
let totalTime = 0;
let tapeSeconds = 60;
let active = null;
let leftScore = 0;
let leftScore2 = 0;
let rightScore = 0;
let rightScore2 = 0;
let gameOver = false;
let isPaused = false;
let goalScorer = null;
let leftMoves = 0;
let rightMoves = 0;
let moveLimit = 0;

function formatTime(sec) {
    const m = String(Math.floor(sec / 60)).padStart(2, "0");
    const s = String(sec % 60).padStart(2, "0");
    return `${m}:${s}`;
}

function updateDisplays() {
    leftClockEl.textContent = formatTime(leftTime);
    rightClockEl.textContent = formatTime(rightTime);
    
    if (gameOver) {
        let result = "";
        // Lógica de Vencedor pedida pelo Analista
        if (leftScore > rightScore) result = "VERDE VENCEU!";
        else if (rightScore > leftScore) result = "AMARELO VENCEU!";
        else result = "EMPATE!";
        
        totalClockEl.textContent = result;
        totalClockEl2.textContent = result;
    } else {
        if (moveLimit > 0) {
            totalClockEl.textContent = "";
            totalClockEl2.textContent = "";
        } else {
            totalClockEl.textContent = formatTime(totalTime);
            totalClockEl2.textContent = formatTime(totalTime);
        }
    }

    scoreEl.textContent = `${leftScore} : ${rightScore}`;
    scoreEl2.textContent = `${rightScore2} : ${leftScore2}`;
    leftMoveEl.textContent = `Jogadas: ${leftMoves}`;
    rightMoveEl.textContent = `Jogadas: ${rightMoves}`;
}

function resetGame() {
    clearInterval(timer);
    timer = null;
    isPaused = false;
    leftTime = 0;
    rightTime = 0;
    totalTime = 0;
    leftScore = 0;
    leftScore2 = 0;
    rightScore = 0;
    rightScore2 = 0;
    leftMoves = 0;
    rightMoves = 0;
    active = null;
    gameOver = false;
    goalScorer = null;
    moveLimit = 0;

    setControlsState(false); 
    updateStartBtnIcon();
    
    leftSide.classList.remove("timeout");
    rightSide.classList.remove("timeout");

    const defaultTotal = parseInt(totalSelect.value);
    totalTime = defaultTotal;
    updateDisplays();
}

function setControlsState(disabled) {
    document.getElementById("leftGoalBtn").disabled = disabled || active !== "left";
    document.getElementById("rightGoalBtn").disabled = disabled || active !== "right";
    document.getElementById("leftFlag").disabled = disabled;
    document.getElementById("rightFlag").disabled = disabled;
    
    const isGameInProgress = (timer !== null);
    document.getElementById("flagBtn").disabled = isGameInProgress; 
    tapeSelect.disabled = isGameInProgress;
    totalSelect.disabled = isGameInProgress;

    if (goalScorer !== null || (active && isPaused && timer === null)) {
        startBtn.disabled = true;
    } else {
        startBtn.disabled = false;
    }
}

startBtn.onclick = () => {
    if (gameOver) return;
    if (timer === null && active === null) {
        enterFullscreen();
        startDraw(); 
        return;
    }
    if (timer === null && active !== null) return;
    isPaused = !isPaused;
    updateStartBtnIcon();
    updateDisplays();
};

function updateStartBtnIcon() {
    const icon = startBtn.querySelector('i');
    if (timer && !isPaused) {
        icon.className = 'bi bi-pause-fill';
        startBtn.classList.replace('btn-primary', 'btn-warning');
    } else {
        icon.className = 'bi bi-play-fill';
        startBtn.classList.replace('btn-warning', 'btn-primary');
    }
}

function tick() {
    if (gameOver || isPaused || !active) return;

    if (active === "left") {
        if (leftTime > 0) {
            leftTime--;
        } else {
            leftSide.classList.add("timeout");
            isPaused = true;
            updateStartBtnIcon();
            return;
        }
    } else if (active === "right") {
        if (rightTime > 0) {
            rightTime--;
        } else {
            rightSide.classList.add("timeout");
            isPaused = true;
            updateStartBtnIcon();
            return;
        }
    }

    if (moveLimit === 0) {
        if (totalTime > 0) {
            totalTime--;
        } else {
            // --- AJUSTE DO ANALISTA: FIM DO TEMPO TOTAL ---
            gameOver = true;
            clearInterval(timer);
            leftTime = 0;
            rightTime = 0;
            setControlsState(true);
            updateStartBtnIcon();
        }
    }
    updateDisplays();
}

function startDraw() {
    if (timer !== null || gameOver) return;
    let iterations = 0;
    const maxIterations = 10 + Math.floor(Math.random() * 10);
    startBtn.disabled = true;

    const interval = setInterval(() => {
        if (iterations % 2 === 0) {
            leftSide.classList.add("draw-highlight");
            rightSide.classList.remove("draw-highlight");
        } else {
            rightSide.classList.add("draw-highlight");
            leftSide.classList.remove("draw-highlight");
        }
        iterations++;
        if (iterations >= maxIterations) {
            clearInterval(interval);
            const winner = Math.random() < 0.5 ? "left" : "right";
            leftSide.classList.remove("draw-highlight");
            rightSide.classList.remove("draw-highlight");
            setTimeout(() => { announceWinner(winner); }, 300);
        }
    }, 150);
}

function announceWinner(winner) {
    totalTime = parseInt(totalSelect.value);
    tapeSeconds = parseInt(tapeSelect.value);
    leftTime = tapeSeconds;
    rightTime = tapeSeconds;
    active = winner;
    isPaused = true; 
    const winnerEl = winner === "left" ? leftSide : rightSide;
    winnerEl.classList.add("draw-highlight");
    setTimeout(() => winnerEl.classList.remove("draw-highlight"), 3000);
    setControlsState(true);
    updateDisplays();
    updateStartBtnIcon();
}

leftSide.onclick = () => {
    if (gameOver || (timer === null && active === "right") || (isPaused && goalScorer === "left")) return;
    if (isPaused) {
        if (timer === null) timer = setInterval(tick, 1000);
        leftSide.classList.remove("timeout");
        rightSide.classList.remove("timeout");
        isPaused = false;
        goalScorer = null;
        active = "left";
        setControlsState(false); 
    } else if (active === "left") {
        leftMoves++; 
        checkGameOver();
        leftTime = parseInt(tapeSelect.value);
        rightTime = parseInt(tapeSelect.value);
        active = "right";
    }
    updateStartBtnIcon();
    setControlsState(isPaused);
    updateDisplays();
};

rightSide.onclick = () => {
    if (gameOver || (timer === null && active === "left") || (isPaused && goalScorer === "right")) return;
    if (isPaused) {
        if (timer === null) timer = setInterval(tick, 1000);
        leftSide.classList.remove("timeout");
        rightSide.classList.remove("timeout");
        isPaused = false;
        goalScorer = null;
        active = "right";
        setControlsState(false); 
    } else if (active === "right") {
        rightMoves++;
        checkGameOver();
        leftTime = parseInt(tapeSelect.value);
        rightTime = parseInt(tapeSelect.value);
        active = "left";
    }
    updateStartBtnIcon();
    setControlsState(isPaused);
    updateDisplays();
};

document.getElementById("leftGoalBtn").onclick = e => {
    e.stopPropagation();
    if (gameOver || isPaused) return;
    leftScore++; leftScore2++; leftMoves++;
    checkGameOver();
    isPaused = true;
    goalScorer = "left";
    setControlsState(true);
    leftTime = parseInt(tapeSelect.value);
    rightTime = parseInt(tapeSelect.value);
    updateStartBtnIcon();
    updateDisplays();
};

document.getElementById("rightGoalBtn").onclick = e => {
    e.stopPropagation();
    if (gameOver || isPaused) return;
    rightScore++; rightScore2++; rightMoves++;
    checkGameOver();
    isPaused = true;
    goalScorer = "right";
    setControlsState(true);
    leftTime = parseInt(tapeSelect.value);
    rightTime = parseInt(tapeSelect.value);
    updateStartBtnIcon();
    updateDisplays();
};

function handleFlagAction(playerSide) {
    if (gameOver || isPaused) return;

    // 1. Incrementa a jogada de quem solicitou a bandeira
    if (playerSide === "left") {
        leftMoves++;
    } else {
        rightMoves++;
    }

    // 2. Verifica se atingiu o limite de jogadas
    checkGameOver();
    if (gameOver) return; // Se o jogo acabou no limite, não precisa pausar para retomada

    // 3. Define o estado de pausa idêntico ao Golo
    isPaused = true;
    goalScorer = playerSide; // Registramos quem clicou para bloquear o reinício dele mesmo
    
    // 4. Bloqueia os botões até o toque do adversário
    setControlsState(true);

    // 5. Reseta os tapes para o próximo turno
    leftTime = parseInt(tapeSelect.value);
    rightTime = parseInt(tapeSelect.value);

    updateStartBtnIcon();
    updateDisplays();
}

document.getElementById("leftFlag").onclick = e => {
    e.stopPropagation();
    handleFlagAction("left");
};

document.getElementById("rightFlag").onclick = e => {
    e.stopPropagation();
    handleFlagAction("right");
};

document.getElementById("flagBtn").onclick = () => {
    if (timer !== null) return;
    const input = prompt("Número de Jogadas (Limite):");
    if (input === null) return;
    if (input.trim() === "") { alert("O campo não pode estar vazio!"); return; }
    const parsedInput = Number(input);
    if (isNaN(parsedInput)) { alert("O valor digitado não é um número!"); return; }
    if (parsedInput <= 0) { alert("É necessário que seja um número maior que zero!"); return; }
    moveLimit = Math.floor(parsedInput);
    updateDisplays();
};

function checkGameOver() {
    if (moveLimit > 0) {
        if (leftMoves >= moveLimit && rightMoves >= moveLimit) {
            gameOver = true;
            clearInterval(timer);
            isPaused = true;
            leftTime = 0; // Zera tapes
            rightTime = 0; // Zera tapes
            setControlsState(true);
            updateStartBtnIcon();
            updateDisplays();
        }
    }
}

resetBtn.onclick = () => { resetGame(); exitFullscreen(); };

function enterFullscreen() {
    const elem = document.documentElement;
    if (elem.requestFullscreen) elem.requestFullscreen();
    else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
    else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
}

function exitFullscreen() {
    if (document.exitFullscreen) document.exitFullscreen();
}
</script>
</body>
</html>
