<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Cronômetro Board Manager™</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui">


<style>
* { touch-action: manipulation; }

html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
}

body {
    display: flex;
    flex-direction: column;
    background: #f8f9fa;
}

/* Painel superior */
#topPanel {
    padding: 10px;
    background: #ffffff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    z-index: 10;
}

/* Área do jogo */
#board {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* Lados */
.side {
    height: 100%;
    padding: 10px; /* Era 20px */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px; /* Era 15px */
    transition: background-color 0.3s ease;
}

.side.active {
    background-color: #e9ecef;
}

.clock-display {
    font-size: 2.8rem; 
    line-height: 1;
}

.player-label {
    font-size: 1.2rem;
    margin-top: 10px;
}

/* Placar */
#score {
    font-size: 1.5rem;
    font-weight: bold;
    margin: 0 15px;
    transform: rotate(180deg);
}

/* Container circular para as logos */
.logo-wrapper {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border: 1px solid;      /* Espessura da borda */
}

.logo-wrapper img {
    width: 100%;             /* A imagem ocupa 80% do círculo para não tocar na borda */
    height: 100%;
}

/* Cores específicas das bordas */
.border-yellow {
    border-color: #cabd05;
}

.border-green {
    border-color: #33ca05; /* O mesmo verde que usaste no leftSide */
}

/* Ajuste no placar para não ficar colado */
#score2 {
    font-size: 1.5rem;
    font-weight: bold;
    margin: 0 15px;
}

.btn-circle {
    width: 48px; /* Era 56px */
    height: 48px; /* Era 56px */
    border-radius: 50%;
}

.btn-circle i {
    font-size: 1.5rem; /* Era 1.8rem */
}
/* Bloco central */
.center-side {
    height: 80px;
    margin: 6px 0;
    border: 2px solid #000;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.2rem;
    font-weight: bold;
    background: #fff;
}

#leftSide {
    background: #33ca05;
    transform: rotate(180deg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 15px;
}

#leftSide .button-group { order: 1; }
#leftSide #totalClock  { order: 2; }
#leftSide #leftClock   { order: 3; }

#rightSide {
    background: #cabd05;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 15px;
}

/* Ordem para o jogador de baixo */
#rightSide .button-group { order: 1; }
#rightSide #totalClock2 { order: 2; }
#rightSide #rightClock  { order: 3; }

.button-group {
    display: flex;
    flex-direction: row;
    justify-content: center;
    gap: 20px; /* Era 30px */
    margin-bottom: 2px; /* Era 10px */
}

.side {
    height: 100%; /* Garante que a div ocupe o espaço necessário */
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: background-color 0.3s ease;
}

.timeout {
    background-color: #dc3545 !important; /* Vermelho do Bootstrap */
}

#rightSide {
    background: #cabd05;
}

#totalClock, #totalClock2 {
    font-size: 28px; /* Era 35px */
}

.btn-circle:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

#startBtn:disabled {
    opacity: 0.5;
    filter: grayscale(1);
}

.move-counter {
    font-size: 1.2rem;
    background: rgba(255, 255, 255, 0.2);
    padding: 2px 10px;
    border-radius: 10px;
    margin-bottom: 5px;
}

/* Ajuste na ordem visual para manter o contador no topo */
#leftSide .move-counter { order: 0; }
#rightSide .move-counter { order: 0; }

.draw-highlight {
    filter: brightness(1.8);
    transition: filter 0.1s ease-in-out, filter 0.5s ease-out;
}

.limit-active {
    color: #dc3545; /* Vermelho para indicar que há um limite */
    text-decoration: underline;
}

select:disabled, button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

@media (max-height: 600px) {
    .clock-display { font-size: 2.2rem; }
    #totalClock, #totalClock2 { font-size: 22px; }
    .side { gap: 5px; }
}

</style>
</head>

<body>

<!-- Tabuleiro -->
<div id="board">

    <div id="leftSide" class="side">
        <div id="leftMoveDisplay" class="move-counter">Jogadas: 0</div>
        <div class="button-group">
            <button id="leftGoalBtn" class="btn btn-circle">
                <i class="fa-solid fa-futbol"></i>
            </button>
            <button id="leftFlag" class="btn btn-circle">
                <i class="fa-solid fa-flag-checkered"></i>
            </button>
        </div>      
        <span id="totalClock">00:00</span>
        <div class="clock-display" id="leftClock">00:00</div>        
    </div>

    <!-- BLOCO CENTRAL -->
    <div id="topPanel" class="text-center">
        
        <div class="row d-flex align-items-center justify-content-center g-3">
            <div class="col-auto">
                <div class="logo-wrapper border-yellow" style="background-color: #cabd05;">
                    <img src="logo.png" alt="logo" >
                </div>
            </div>

            <div class="col-auto">
                <div id="score">0 : 0</div>
            </div>

            <div class="col-auto">
                <div class="logo-wrapper border-green" style="background-color: #33ca05;">
                    <img src="logo.png" alt="logo" >
                </div>
            </div>
        </div>        
        
        <div class="row g-2 mb-2 align-items-center justify-content-center">
            <div class="col-4">
                <select id="tapeSelect" class="form-select">
                    <option value="30" selected>30s</option>
                    <option value="60">1min</option>
                    <option value="90">1min30s</option>
                </select>
            </div>
            <div class="col-4">
                <select id="totalSelect" class="form-select">
                    <option value="300" selected>5min</option>
                    <option value="600">10min</option>
                    <option value="1200">20min</option>
                </select>
            </div>
            <div class="col-4">
                <button id="startBtn" class="btn btn-primary w-100">
                    <i class="bi bi-play-fill"></i>
                </button>
            </div>

            <!-- <div class="col-4">
                <button id="drawBtn" class="btn btn-info w-100 text-white">
                    <strong>INICIAR</strong>
                </button>
            </div> -->
            <div class="col-4">
                <button id="flagBtn" class="btn w-100 bg-dark text-white ">
                    <strong>JOGADAS</strong>
                </button>
            </div>
            <div class="col-4">
                <button id="resetBtn" class="btn btn-outline-secondary w-100">
                    <i class="bi bi-arrow-counterclockwise"></i>
                </button>
            </div>
        </div>

        <div class="row d-flex align-items-center justify-content-center g-3">
            <div class="col-auto">
                <div class="logo-wrapper border-yellow" style="background-color: #cabd05;">
                    <img src="logo.png" alt="logo" >
                </div>
            </div>

            <div class="col-auto">
                <div id="score2">0 : 0</div>
            </div>

            <div class="col-auto">
                <div class="logo-wrapper border-green" style="background-color: #33ca05;">
                    <img src="logo.png" alt="logo" >
                </div>
            </div>
        </div>
    </div>
    

    <div id="rightSide" class="side">
        <div id="rightMoveDisplay" class="move-counter">Jogadas: 0</div>
        <div class="button-group">
            <button id="rightGoalBtn" class="btn btn-circle">
                <i class="fa-solid fa-futbol"></i>
            </button>
            <button id="rightFlag" class="btn btn-circle">
                <i class="fa-solid fa-flag-checkered"></i>
            </button>
        </div>      
        <span id="totalClock2">00:00</span>
        <div class="clock-display" id="rightClock">00:00</div>        
    </div>


</div>


<script>
const leftSide = document.getElementById("leftSide");
const rightSide = document.getElementById("rightSide");
const leftClockEl = document.getElementById("leftClock");
const rightClockEl = document.getElementById("rightClock");
const totalClockEl = document.getElementById("totalClock");
const totalClockEl2 = document.getElementById("totalClock2");
const scoreEl = document.getElementById("score");
const scoreEl2 = document.getElementById("score2");
const startBtn = document.getElementById("startBtn");
const resetBtn = document.getElementById("resetBtn");
const tapeSelect = document.getElementById("tapeSelect");
const totalSelect = document.getElementById("totalSelect");
const leftMoveEl = document.getElementById("leftMoveDisplay");
const rightMoveEl = document.getElementById("rightMoveDisplay");
//const drawBtn = document.getElementById("drawBtn");

let timer = null;
let leftTime = 0;
let rightTime = 0;
let totalTime = 0;
let tapeSeconds = 60;
let active = null;
let leftScore = 0;
let leftScore2 = 0;
let rightScore = 0;
let rightScore2 = 0;
let gameOver = false;
let isPaused = false; // Controle de pausa
let goalScorer = null; // Nova variável para saber quem marcou o golo
let leftMoves = 0;
let rightMoves = 0;
let moveLimit = 0; // 0 significa desativado

function formatTime(sec) {
    const m = String(Math.floor(sec / 60)).padStart(2, "0");
    const s = String(sec % 60).padStart(2, "0");
    return `${m}:${s}`;
}

function updateDisplays() {
    leftClockEl.textContent = formatTime(leftTime);
    rightClockEl.textContent = formatTime(rightTime);
    
    if (moveLimit > 0) {
        // Se o jogo acabou, mostra a mensagem. Se não, fica vazio.
        if (gameOver) {
            totalClockEl.textContent = "FIM DE JOGO";
            totalClockEl2.textContent = "FIM DE JOGO";
        } else {
            totalClockEl.textContent = "";
            totalClockEl2.textContent = "";
        }
    } else {
        // Modo normal por tempo
        totalClockEl.textContent = formatTime(totalTime);
        totalClockEl2.textContent = formatTime(totalTime);
    }

    scoreEl.textContent = `${leftScore} : ${rightScore}`;
    scoreEl2.textContent = `${rightScore2} : ${leftScore2}`;

    leftMoveEl.textContent = `Jogadas: ${leftMoves}`;
    rightMoveEl.textContent = `Jogadas: ${rightMoves}`;
}

function resetGame() {
    clearInterval(timer);
    timer = null;
    isPaused = false;
    leftTime = 0;
    rightTime = 0;
    totalTime = 0;
    leftScore = 0;
    leftScore2 = 0;
    rightScore = 0;
    rightScore2 = 0;
    leftMoves = 0;
    rightMoves = 0;
    active = null;
    gameOver = false;
    goalScorer = null;
    moveLimit = 0;

    totalClockEl.textContent = formatTime(parseInt(totalSelect.value));
    totalClockEl2.textContent = formatTime(parseInt(totalSelect.value));

    // LIBERA TUDO PARA NOVA CONFIGURAÇÃO
    setControlsState(false); 
    
    updateStartBtnIcon();
    updateDisplays();
    
    leftSide.classList.remove("timeout");
    rightSide.classList.remove("timeout");

    const defaultTotal = parseInt(totalSelect.value);
    totalClockEl.textContent = formatTime(defaultTotal);
    totalClockEl2.textContent = formatTime(defaultTotal);
}

// 1. Função auxiliar para controlar TODOS os botões da tela
// 1. Função auxiliar para controlar TODOS os botões da tela
function setControlsState(disabled) {
    // --- REGRAS PARA OS BOTÕES LATERAIS (Golo e Flag) ---
    
    // O golo só é liberado se: não estiver em pausa (disabled) E for a vez do jogador (active)
    document.getElementById("leftGoalBtn").disabled = disabled || active !== "left";
    document.getElementById("rightGoalBtn").disabled = disabled || active !== "right";

    // As bandeiras individuais bloqueiam sempre que o jogo pausa (golo ou timeout)
    document.getElementById("leftFlag").disabled = disabled;
    document.getElementById("rightFlag").disabled = disabled;
    
    // --- REGRAS PARA O PAINEL CENTRAL (Selects, Sorteio, Jogadas) ---
    
    // O Painel Central só deve bloquear se o jogo REALMENTE começou (timer não é null)
    // Ele NÃO deve depender do parâmetro 'disabled' do turno.
    const isGameInProgress = (timer !== null);

    // Se o drawBtn existir, controlamos ele. 
    //if (drawBtn) drawBtn.disabled = isGameInProgress; 
    
    document.getElementById("flagBtn").disabled = isGameInProgress; 
    tapeSelect.disabled = isGameInProgress;
    totalSelect.disabled = isGameInProgress;

    // --- REGRA PARA O BOTÃO PLAY/PAUSE ---
    
    // Bloqueia apenas em situações críticas: golo marcado ou esperando toque inicial pós-sorteio
    if (goalScorer !== null || (active && isPaused && timer === null)) {
        startBtn.disabled = true;
    } else {
        startBtn.disabled = false;
    }
}

// Lógica do Botão Play/Pause
startBtn.onclick = () => {
    if (gameOver) return;

    // Se o timer é nulo e ainda não houve um vencedor de sorteio (active é null)
    if (timer === null && active === null) {
        // Inicia o sorteio automaticamente
        enterFullscreen();
        startDraw(); 
        return;
    }

    // Se já houve sorteio mas o jogo está parado esperando o primeiro toque na div
    if (timer === null && active !== null) {
        // Opcional: Você pode avisar que o jogador sorteado deve tocar na tela
        return;
    }

    // Comportamento normal de Pause/Play
    isPaused = !isPaused;
    updateStartBtnIcon();
    updateDisplays();
};

// Função para mudar o ícone do botão principal
function updateStartBtnIcon() {
    const icon = startBtn.querySelector('i');
    if (timer && !isPaused) {
        icon.className = 'bi bi-pause-fill';
        startBtn.classList.replace('btn-primary', 'btn-warning');
    } else {
        icon.className = 'bi bi-play-fill';
        startBtn.classList.replace('btn-warning', 'btn-primary');
    }
}

function tick() {
    if (gameOver || isPaused || !active) return;

    if (active === "left") {
        if (leftTime > 0) {
            leftTime--;
        } else {
            // O tempo do jogador da esquerda acabou!
            leftSide.classList.add("timeout"); // Fica vermelho
            isPaused = true; // Pausa o jogo (congelando o relógio total)
            updateStartBtnIcon();
            return;
        }
    } else if (active === "right") {
        if (rightTime > 0) {
            rightTime--;
        } else {
            // O tempo do jogador da direita acabou!
            rightSide.classList.add("timeout"); // Fica vermelho
            isPaused = true; // Pausa o jogo
            updateStartBtnIcon();
            return;
        }
    }

    // Só diminui o tempo total se NÃO houver limite de jogadas
    if (moveLimit === 0 && totalTime > 0) {
        totalTime--;
    }
    updateDisplays();
}

function startTurn(side) {
    tapeSeconds = parseInt(tapeSelect.value);
    if (side === "left") {
        leftTime = tapeSeconds;
        active = "left";
    } else {
        rightTime = tapeSeconds;
        active = "right";
    }
    updateDisplays();
}

resetBtn.onclick = () => {
    // Chama a função de reset que já tinhas
    resetGame();
    
    // Volta a tela ao normal
    exitFullscreen();
};

// Interação de clique nas áreas dos jogadores
leftSide.onclick = () => {
    if (gameOver) return;
    
    // TRAVA CRUCIAL: Se o jogo espera o início pós-sorteio e o vencedor foi o DIREITO, ignora o clique na ESQUERDA
    if (timer === null && active === "right") return;

    // Bloqueia se o próprio jogador marcou e o jogo está pausado esperando o outro
    if (isPaused && goalScorer === "left") return; 

    if (isPaused) {
        // --- CASO DE RETOMA (Golo, Timeout ou Pós-Sorteio) ---
        if (timer === null) {
            timer = setInterval(tick, 1000);
        }

        leftSide.classList.remove("timeout");
        rightSide.classList.remove("timeout");
        isPaused = false;
        goalScorer = null;
        
        active = "left";
        setControlsState(false); 
    } else if (active === "left") {
        leftMoves++; 
        checkGameOver(); // Verifica se atingiu o limite ao passar a vez
        leftTime = parseInt(tapeSelect.value);
        rightTime = parseInt(tapeSelect.value);
        active = "right";
    }
    updateStartBtnIcon();
    setControlsState(isPaused);
    updateDisplays();
};

rightSide.onclick = () => {
    if (gameOver) return;
    
    // TRAVA CRUCIAL: Se o jogo espera o início pós-sorteio e o vencedor foi o ESQUERDO, ignora o clique na DIREITA
    if (timer === null && active === "left") return;

    // Bloqueia se o próprio jogador marcou e o jogo está pausado
    if (isPaused && goalScorer === "right") return;

    if (isPaused) {
        // --- CASO DE RETOMA (Golo, Timeout ou Pós-Sorteio) ---
        if (timer === null) {
            timer = setInterval(tick, 1000);
        }

        leftSide.classList.remove("timeout");
        rightSide.classList.remove("timeout");
        isPaused = false;
        goalScorer = null;
        
        active = "right";
        setControlsState(false); 
    } else if (active === "right") {
        rightMoves++;
        checkGameOver(); // Verifica se atingiu o limite ao passar a vez
        leftTime = parseInt(tapeSelect.value);
        rightTime = parseInt(tapeSelect.value);
        active = "left";
    }
    updateStartBtnIcon();
    setControlsState(isPaused);
    updateDisplays();
};

// Botão de Golo Esquerda
document.getElementById("leftGoalBtn").onclick = e => {
    e.stopPropagation();
    if (gameOver || isPaused) return;

    leftScore++;
    leftScore2++;
    leftMoves++; // Adiciona a jogada para quem fez o golo
    checkGameOver();
    
    isPaused = true;
    goalScorer = "left";
    setControlsState(true);
    
    leftTime = parseInt(tapeSelect.value);
    rightTime = parseInt(tapeSelect.value);

    updateStartBtnIcon();
    updateDisplays();
};

/// Botão de Golo Direita
document.getElementById("rightGoalBtn").onclick = e => {
    e.stopPropagation();
    if (gameOver || isPaused) return;

    rightScore++;
    rightScore2++;
    rightMoves++; // Adiciona a jogada para quem fez o golo
    checkGameOver();
    
    isPaused = true;
    goalScorer = "right";
    setControlsState(true);
    
    leftTime = parseInt(tapeSelect.value);
    rightTime = parseInt(tapeSelect.value);

    updateStartBtnIcon();
    updateDisplays();
};

// Botões de Flag
function handleFlagAction() {
    if (gameOver) return;
    isPaused = true;
    leftTime = parseInt(tapeSelect.value);
    rightTime = parseInt(tapeSelect.value);
    updateStartBtnIcon();
    updateDisplays();
}

document.getElementById("leftFlag").onclick = e => {
    e.stopPropagation();
    handleFlagAction();
};

document.getElementById("rightFlag").onclick = e => {
    e.stopPropagation();
    handleFlagAction();
};

function startDraw() {
    if (timer !== null || gameOver) return;

    let iterations = 0;
    const maxIterations = 10 + Math.floor(Math.random() * 10);
    
    //drawBtn.disabled = true;
    startBtn.disabled = true;

    const interval = setInterval(() => {
        if (iterations % 2 === 0) {
            leftSide.classList.add("draw-highlight");
            rightSide.classList.remove("draw-highlight");
        } else {
            rightSide.classList.add("draw-highlight");
            leftSide.classList.remove("draw-highlight");
        }

        iterations++;

        if (iterations >= maxIterations) {
            clearInterval(interval);
            const winner = Math.random() < 0.5 ? "left" : "right";
            leftSide.classList.remove("draw-highlight");
            rightSide.classList.remove("draw-highlight");

            setTimeout(() => {
                announceWinner(winner);
            }, 300);
        }
    }, 150);
}

// drawBtn.onclick = () => {
//     startDraw()
// };

function announceWinner(winner) {
    totalTime = parseInt(totalSelect.value);
    tapeSeconds = parseInt(tapeSelect.value);
    leftTime = tapeSeconds;
    rightTime = tapeSeconds;
    
    active = winner;
    isPaused = true; 
    
    const winnerEl = winner === "left" ? leftSide : rightSide;
    winnerEl.classList.add("draw-highlight");
    setTimeout(() => winnerEl.classList.remove("draw-highlight"), 3000);

    // BLOQUEIA TUDO: Golos, Flags e Start
    setControlsState(true);
    
    updateDisplays();
    updateStartBtnIcon();
}

document.getElementById("flagBtn").onclick = () => {
    // Só permite configurar se o jogo não tiver começado (timer null)
    if (timer !== null) return;

    const input = prompt("Número de Jogadas (Limite):");

    // 1. Verifica se o utilizador clicou em "Cancelar"
    if (input === null) return;

    // 2. Verifica se o campo está vazio ou se contém apenas espaços
    if (input.trim() === "") {
        alert("O campo não pode estar vazio!");
        return;
    }

    // O Number() é mais rigoroso que o isNaN() puro para strings
    const parsedInput = Number(input);

    if (isNaN(parsedInput)) {
        alert("O valor digitado não é um número!");
        return;
    }
    
    if (parsedInput <= 0) {
        alert("É necessário que seja um número maior que zero!");
        return;
    }

    // Se passou por todas as validações, define o limite
    moveLimit = Math.floor(parsedInput);
    updateDisplays();
};

// Função que verifica se a partida deve encerrar por limite de jogadas 
function checkGameOver() {
    if (moveLimit > 0) {
        if (leftMoves >= moveLimit && rightMoves >= moveLimit) {
            gameOver = true;
            clearInterval(timer);
            isPaused = true;
            
            // Bloqueia os controlos
            setControlsState(true);
            
            // Atualiza o ícone do botão
            updateStartBtnIcon();
            
            // Esta chamada vai agora mostrar o "FIM DE JOGO" 
            // porque o gameOver é true
            updateDisplays();

        }
    }
}
// Função para entrar em Ecrã Inteiro (Full Compatibility)
function enterFullscreen() {
    const elem = document.documentElement;

    try {
        if (elem.requestFullscreen) {
            elem.requestFullscreen();
        } else if (elem.mozRequestFullScreen) { // Firefox (S maiúsculo)
            elem.mozRequestFullScreen();
        } else if (elem.webkitRequestFullscreen) { // Chrome, Safari, Opera
            elem.webkitRequestFullscreen();
        } else if (elem.webkitEnterFullscreen) { // Versões específicas do Safari iOS
            elem.webkitEnterFullscreen();
        } else if (elem.msRequestFullscreen) { // IE/Edge antigo
            elem.msRequestFullscreen();
        }
    } catch (err) {
        // ignora
    }
}

function exitFullscreen() {
    try {
        if (document.exitFullscreen) {
            document.exitFullscreen();
        } else if (document.mozCancelFullScreen) { // Firefox
            document.mozCancelFullScreen();
        } else if (document.webkitExitFullscreen) { // Safari/Chrome
            document.webkitExitFullscreen();
        } else if (document.msExitFullscreen) {
            document.msExitFullscreen();
        }
    } catch (err) {
        // Apenas ignora se já tiver saído
    }
}

</script>
